# Basic display (Tela oficial do ZMK)
CONFIG_ZMK_DISPLAY=n

# Improve Bluetooth signal (Aumenta a força do sinal)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# deep sleep + idle timeout (Modo soneca para economizar bateria)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=3600000

# wake on press (Acordar o teclado ao pressionar tecla)
CONFIG_GPIO=y

# enable mouse keys (Permite controlar o cursor pelo teclado)
CONFIG_ZMK_POINTING=y
